<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 230" width="880" height="230" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- canvas background -->
  <rect x="1" y="1" width="878" height="228" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>

  <!-- title -->
  <text x="32" y="40" font-size="16" font-weight="700" fill="#1f2937">Insight pipeline</text>
  <text x="32" y="60" font-size="12" fill="#6b7280">Ingest &#8594; Transform &#8594; Analyze &#8594; Report</text>

  <!-- Stage 1: source -->
  <rect x="32" y="92" width="148" height="88" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="106" y="130" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">CSV / public API</text>
  <text x="106" y="150" font-size="11" fill="#4b5563" text-anchor="middle">input source</text>

  <!-- Stage 2: ingest -->
  <rect x="208" y="92" width="148" height="88" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="282" y="128" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">ingest.py</text>
  <text x="282" y="148" font-size="11" fill="#4b5563" text-anchor="middle">load + validate</text>

  <!-- Stage 3: transform -->
  <rect x="384" y="92" width="148" height="88" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="458" y="124" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">transform.py</text>
  <text x="458" y="143" font-size="11" fill="#4b5563" text-anchor="middle">clean, types,</text>
  <text x="458" y="158" font-size="11" fill="#4b5563" text-anchor="middle">aggregate</text>

  <!-- Stage 4: analyze -->
  <rect x="560" y="92" width="148" height="88" rx="12" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="634" y="124" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">analyze.py</text>
  <text x="634" y="143" font-size="11" fill="#4b5563" text-anchor="middle">trend, growth,</text>
  <text x="634" y="158" font-size="11" fill="#4b5563" text-anchor="middle">anomalies, insights</text>

  <!-- Stage 5: report -->
  <rect x="736" y="92" width="112" height="88" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="792" y="128" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">report.py</text>
  <text x="792" y="146" font-size="11" fill="#4b5563" text-anchor="middle">charts +</text>
  <text x="792" y="161" font-size="11" fill="#4b5563" text-anchor="middle">HTML / MD</text>

  <!-- edges -->
  <line x1="180" y1="136" x2="206" y2="136" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="356" y1="136" x2="382" y2="136" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="532" y1="136" x2="558" y2="136" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="708" y1="136" x2="734" y2="136" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="193" y="128" font-size="9" fill="#6b7280" text-anchor="middle">raw</text>
  <text x="369" y="128" font-size="9" fill="#6b7280" text-anchor="middle">rows</text>
  <text x="545" y="128" font-size="9" fill="#6b7280" text-anchor="middle">series</text>
  <text x="721" y="128" font-size="9" fill="#6b7280" text-anchor="middle">insights</text>
</svg>
