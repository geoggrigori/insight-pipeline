name: Scheduled report

# Regenerates the insights report on a schedule and publishes it as a
# downloadable artifact. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 7 * * 1" # every Monday at 07:00 UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate report
        run: python -m insight run --out report
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: insights-report
          path: report/
